workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: 16.0   # 👈 MANTENER ESTE

      vars:
        BUNDLE_ID: "com.manelrius.huchas"
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

    integrations:
      app_store_connect: Codemagic API

    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build web
        script: |
          cd frontend
          npm run build

      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios

      - name: Build iOS archive
        script: |
          xcodebuild \
          -workspace $XCODE_WORKSPACE \
          -scheme $XCODE_SCHEME \
          -configuration Release \
          -archivePath build/App.xcarchive \
          archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
          -archivePath build/App.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
