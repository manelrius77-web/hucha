workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: 16.0
      ios_signing:
        environment:
    ios_signing:
      distribution_type: app_store
      bundle_identifier: com.manelrius.huchas
      provisioning_profiles:
      - Huchas AppStore
      vars:
        BUNDLE_ID: "com.manelrius.huchas"
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

    scripts:
      - name: Clean & install
        script: |
          cd frontend
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Build web
        script: |
          cd frontend
          npm run build

      - name: Sync Capacitor iOS
        script: |
          cd frontend
          npx cap sync ios

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM.zip
