workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      node: 22
      xcode: 16.0

    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build web
        script: |
          cd frontend
          npm run build

      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios

      - name: CocoaPods install
        script: |
          cd frontend/ios/App
          pod install

      - name: Build iOS (no firma)
        script: |
          cd frontend/ios/App
          xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -sdk iphoneos \
          -configuration Release \
          archive -archivePath $HOME/build/App.xcarchive \
          CODE_SIGNING_ALLOWED=NO

    artifacts:
      - $HOME/build/*.xcarchive
