workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: 16.0
      vars:
        BUNDLE_ID: "com.manelrius.huchas"
        TEAM_ID: "W27J7P3Z8R"

    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build web
        script: |
          cd frontend
          npm run build

      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios

      - name: Create exportOptions.plist
        script: |
          cat > frontend/ios/App/exportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

      - name: Build iOS archive
        script: |
          cd frontend/ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $HOME/build/App.xcarchive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID \
            archive

      - name: Export IPA
        script: |
          cd frontend/ios/App
          xcodebuild -exportArchive \
            -archivePath $HOME/build/App.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath $HOME/build/exported

    artifacts:
      - $HOME/build/App.xcarchive
      - $HOME/build/exported/*.ipa
      - /tmp/xcodebuild_logs/*.log