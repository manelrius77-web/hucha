workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: 16.0

    vars:
      BUNDLE_ID: "com.manelrius.huchas"
      XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
      XCODE_SCHEME: "App"

    ios_signing:
      provisioning_profiles:
        - huchas-riuse

    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build web app
        script: |
          cd frontend
          npm run build

      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios

      - name: Build iOS
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive archive

    artifacts:
      - build/App.xcarchive
