workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: 16.0
      vars:
        BUNDLE_ID: "com.manelrius.huchas"
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Build web
        script: |
          cd frontend
          npm run build

      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
