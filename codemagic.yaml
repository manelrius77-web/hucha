workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: 16.0

    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build web app
        script: |
          cd frontend
          npm run build

      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios

      - name: Build iOS
        script: |
          xcodebuild \
            -workspace frontend/ios/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive

    artifacts:
      - build/App.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
